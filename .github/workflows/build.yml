name: Build

on:
  push:
    branches: [alpha, beta, rc, main]
  workflow_dispatch:

jobs:
  # --- Test + Release ---
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Verify Go modules
        uses: cruciblehq/.github/actions/verify-go-modules@main

      - name: Run Go tests and coverage
        uses: cruciblehq/.github/actions/go-test-coverage@main

      - name: Generate Go reference docs
        run: |
          go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@latest
          mkdir -p docs
          gomarkdoc -u -o docs/index.md ./...

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs/

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "github-actions[bot]@users.noreply.github.com"
        run: |
          npx --yes \
            -p semantic-release@^23.0.0 \
            -p @semantic-release/commit-analyzer@^13.0.0 \
            -p @semantic-release/exec@^6.0.3 \
            -p @semantic-release/github@^10.0.0 \
            -p @semantic-release/release-notes-generator@^14.0.0 \
            -p conventional-changelog-conventionalcommits@^7.0.0 \
            semantic-release

      - name: Check for release
        id: release
        run: |
          if [ -f .release-version ]; then
            VERSION=$(cat .release-version)
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "Released version: $VERSION"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "No new release"
          fi

  # --- Build ---
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: release
    if: needs.release.outputs.released == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.os }}
    env:
      MAC_SIGN_IDENTITY: ${{ secrets.MAC_SIGN_IDENTITY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Build
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          COMMIT=$(git rev-parse --short HEAD)
          if [ "${{ github.ref_name }}" = "main" ]; then
            STAGE="release"
          else
            STAGE="${{ github.ref_name }}"
          fi

          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build -v -ldflags "\
            -X github.com/cruciblehq/crux/internal.version=${VERSION} \
            -X github.com/cruciblehq/crux/internal.stage=${STAGE} \
            -X github.com/cruciblehq/crux/internal.gitCommit=${COMMIT}" \
          -o dist/crux-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/crux

      - name: Import signing certificate
        if: matrix.goos == 'darwin'
        id: import-cert
        uses: ./.github/actions/import-mac-cert
        with:
          mac_cert_p12: ${{ secrets.MAC_CERT_P12 }}
          mac_cert_pwd: ${{ secrets.MAC_CERT_PWD }}

      - name: Sign binary
        if: matrix.goos == 'darwin'
        run: |
          codesign --force --timestamp --options runtime \
            --sign "$MAC_SIGN_IDENTITY" \
            dist/crux-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Cleanup keychain
        if: matrix.goos == 'darwin' && always()
        run: security delete-keychain "${{ steps.import-cert.outputs.keychain }}"

      - uses: actions/upload-artifact@v4
        with:
          name: crux-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  # --- macOS Universal + Notarization ---
  notarize-macos:
    name: Notarize macOS
    needs: [release, build]
    if: needs.release.outputs.released == 'true'
    runs-on: macos-latest
    env:
      MAC_SIGN_IDENTITY: ${{ secrets.MAC_SIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PWD: ${{ secrets.APPLE_APP_PWD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: crux-darwin-amd64
          path: dist/amd64

      - uses: actions/download-artifact@v4
        with:
          name: crux-darwin-arm64
          path: dist/arm64

      - name: Import signing certificate
        id: import-cert
        uses: ./.github/actions/import-mac-cert
        with:
          mac_cert_p12: ${{ secrets.MAC_CERT_P12 }}
          mac_cert_pwd: ${{ secrets.MAC_CERT_PWD }}

      - name: Create universal binary
        run: |
          lipo -create -output dist/crux-darwin-universal \
            dist/arm64/crux-darwin-arm64 \
            dist/amd64/crux-darwin-amd64

      - name: Sign and notarize
        run: |
          codesign --force --timestamp --options runtime \
            --sign "$MAC_SIGN_IDENTITY" dist/crux-darwin-universal

          zip -r dist/crux-darwin-universal.zip dist/crux-darwin-universal

          xcrun notarytool submit dist/crux-darwin-universal.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PWD" \
            --wait

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "${{ steps.import-cert.outputs.keychain }}"

      - uses: actions/upload-artifact@v4
        with:
          name: crux-darwin-universal
          path: dist/crux-darwin-universal

  # --- Upload Release Assets ---
  upload-assets:
    name: Upload Release Assets
    needs: [release, build, notarize-macos]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package archives
        run: |
          mkdir -p dist
          for dir in artifacts/crux-*; do
            [ -d "$dir" ] || continue
            PLATFORM=$(basename "$dir" | sed 's/^crux-//')
            BINARY=$(ls "$dir" | head -1)
            tar -czf "dist/crux-${PLATFORM}.tar.gz" -C "$dir" "$BINARY"
          done

          cd dist && sha256sum crux-*.tar.gz > checksums.txt
          echo "Archives:"
          ls -lh crux-*.tar.gz checksums.txt

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.release.outputs.version }}"
          gh release upload "$TAG" dist/* \
            --repo "$GITHUB_REPOSITORY"

  # --- Publish Pages ---
  publish-pages:
    name: Publish Pages
    needs: release
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: coverage-badge
          path: badges
      - uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage
      - uses: actions/download-artifact@v4
        with:
          name: docs
          path: docs
      - name: Prepare gh-pages
        run: |
          mkdir public
          cp -r coverage badges docs public/
      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
